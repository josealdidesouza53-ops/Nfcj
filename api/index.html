<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Aso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1220;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;height:100vh;overflow:hidden}
.app{display:flex;height:100vh;width:100vw}
.sidebar{display:none}
@media(min-width:768px){.sidebar{display:flex;width:220px;background:#0f172a;flex-direction:column;align-items:center;padding:24px 16px;gap:16px;border-right:1px solid #1e293b}.sidebar img{width:56px;height:56px;border-radius:50%}.sidebar button{width:100%;padding:10px;background:#1e293b;border:1px solid #334155;color:#cbd5e1;border-radius:10px;cursor:pointer;font-size:14px}}
.chat{flex:1;display:flex;flex-direction:column;position:relative;background:#0f172a}
header{height:56px;display:flex;align-items:center;gap:12px;padding:0 14px;background:#1e293b;border-bottom:1px solid #334155;flex-shrink:0}
header img{width:32px;height:32px;border-radius:50%}
header img.spin{animation:s.8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
header h1{font-size:17px;font-weight:600;flex:1}
header select{background:#0f172a;color:#cbd5e1;border:1px solid #334155;padding:6px 10px;border-radius:8px;font-size:13px}
#msgs{flex:1;overflow-y:auto;padding:12px 12px 90px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;align-items:flex-start;animation:m.28s ease-out}
@keyframes m{from{opacity:0;transform:translateY(6px)}}
.msg.user{justify-content:flex-end}
.msg img{width:26px;height:26px;border-radius:50%;margin-top:2px;flex-shrink:0}
.bubble{max-width:85%;padding:10px 14px;background:#1e293b;border-radius:16px;font-size:15px;line-height:1.45;word-wrap:break-word}
.msg.user.bubble{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.bubble b{color:#93c5fd;font-weight:600}
.typing{display:flex;gap:4px;padding:10px 14px;background:#1e293b;border-radius:16px;width:fit-content}
.typing span{width:6px;height:6px;background:#64748b;border-radius:50%;animation:b 1.3s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.input{position:absolute;bottom:0;left:0;right:0;height:74px;padding:10px 12px 14px;background:linear-gradient(to top,#0f172a 70%,transparent);display:flex;gap:8px;align-items:flex-end}
.input textarea{flex:1;height:44px;max-height:100px;padding:11px 13px;background:#1e293b;border:1px solid #334155;border-radius:12px;color:#fff;font-size:15px;resize:none;font-family:inherit;line-height:1.3}
.input textarea:focus{outline:none;border-color:#2563eb}
.input button{height:44px;padding:0 18px;background:#2563eb;color:#fff;border:none;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;flex-shrink:0}
.input button:disabled{opacity:.5}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.box{background:#1e293b;padding:22px;border-radius:14px;width:100%;max-width:420px;border:1px solid #334155}
.box h3{margin-bottom:12px;font-size:18px}
.box p{color:#94a3b8;font-size:14px;line-height:1.5;margin-bottom:16px}
.box button{width:100%;padding:10px;background:#334155;border:none;color:#fff;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <img src="https://www.image2url.com/r2/default/images/1776691290648-eacc2840-7e26-42bb-bd70-73eeae524dba.png">
    <button onclick="openModal()">⚙️ Configurar</button>
  </aside>
  <main class="chat">
    <header>
      <img id="logo" src="https://www.image2url.com/r2/default/images/1776691290648-eacc2840-7e26-42bb-bd70-73eeae524dba.png">
      <h1>Aso</h1>
      <select id="model">
        <option value="fast">Aso Resposta Rápida</option>
        <option value="reasoning">Aso Raciocínio</option>
      </select>
    </header>
    <div id="msgs"></div>
    <div class="input">
      <textarea id="inp" placeholder="Mensagem..." rows="1"></textarea>
      <button id="send">Enviar</button>
    </div>
  </main>
</div>
<div id="modal" class="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="box"><h3>Aso</h3><p>Assistente com 3 agentes internos: Pesquisador, Revisor e Sintetizador. Funciona automaticamente.</p><button onclick="closeModal()">Fechar</button></div></div>
<script>
const $=id=>document.getElementById(id);
const logo=$('logo'),msgs=$('msgs'),inp=$('inp'),send=$('send');
const GEMINI_KEY='AIzaSyBAqgM-XnciHPOHTiZTIGVO-wxeYLLCydc';
const OPENAI_KEY='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';

function openModal(){$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}
function addMsg(html,user=false){const d=document.createElement('div');d.className='msg'+(user?' user':'');d.innerHTML=html;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d}
function addTyping(){const d=addMsg('<img src="https://www.image2url.com/r2/default/images/1776691290648-eacc2840-7e26-42bb-bd70-73eeae524dba.png"><div class="typing"><span></span><span></span><span></span></div>');return d}

async function callFast(prompt){const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});const j=await r.json();return j.candidates?.[0]?.content?.parts?.[0]?.text||'Erro'}
async function callReasoning(prompt){const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENAI_KEY},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:prompt}],max_tokens:800})});const j=await r.json();return j.choices?.[0]?.message?.content||'Erro'}

send.onclick=async()=>{
  const text=inp.value.trim();if(!text)return;
  addMsg(`<div class="bubble">${text}</div>`,true);
  inp.value='';inp.style.height='44px';send.disabled=true;logo.classList.add('spin');
  const typing=addTyping();
  try{
    const model=$('model').value;
    const fast = model==='fast'?callFast:callReasoning;
    const slow = model==='fast'?callReasoning:callFast;

    const p1=await fast(`Você é o Pesquisador. Busque 3 fatos objetivos sobre: ${text}`);
    typing.remove();addMsg(`<img src="https://www.image2url.com/r2/default/images/1776691290648-eacc2840-7e26-42bb-bd70-73eeae524dba.png"><div class="bubble"><b>Pesquisador:</b> ${p1}</div>`);

    const t2=addTyping();
    const p2=await slow(`Você é o Revisor. Critique e aponte lacunas em: ${p1}`);
    t2.remove();addMsg(`<img src="https://www.image2url.com/r2/default/images/1776691290648-eacc2840-7e26-42bb-bd70-73eeae524dba.png"><div class="bubble"><b>Revisor:</b> ${p2}</div>`);

    const t3=addTyping();
    const p3=await fast(`Você é o Aso. Responda a pergunta original "${text}" usando estas informações: ${p1} | ${p2}. Seja direto.`);
    t3.remove();addMsg(`<img src="https://www.image2url.com/r2/default/images/1776691290648-eacc2840-7e26-42bb-bd70-73eeae524dba.png"><div class="bubble">${p3}</div>`);
  }catch(e){typing.remove();addMsg(`<div class="bubble" style="background:#7f1d1d">Erro: ${e.message}</div>`)}
  finally{logo.classList.remove('spin');send.disabled=false;inp.focus()}
};
inp.oninput=()=>{inp.style.height='44px';inp.style.height=Math.min(inp.scrollHeight,100)+'px'};
inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send.click()}};
</script>
</body>
</html>
